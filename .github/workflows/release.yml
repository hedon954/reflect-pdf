name: Release

on:
  push:
    tags:
      - "v*" # 触发：git tag v1.0.0 && git push --tags

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Universal Binary
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lumen-pdf-core

      - name: Install xcodegen
        run: brew install xcodegen

      # ── 编译双架构 ──────────────────────────────────────────────────────────
      - name: Build aarch64 (Apple Silicon)
        working-directory: lumen-pdf-core
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64 (Intel)
        working-directory: lumen-pdf-core
        run: cargo build --release --target x86_64-apple-darwin

      # ── 合并 Universal Binary ───────────────────────────────────────────────
      - name: Merge into Universal Binary
        run: |
          lipo -create \
            lumen-pdf-core/target/aarch64-apple-darwin/release/liblumen_pdf_core.dylib \
            lumen-pdf-core/target/x86_64-apple-darwin/release/liblumen_pdf_core.dylib \
            -output liblumen_pdf_core.dylib
          lipo -info liblumen_pdf_core.dylib

      # ── 生成 Swift 绑定 ─────────────────────────────────────────────────────
      - name: Generate UniFFI Swift bindings
        working-directory: lumen-pdf-core
        run: |
          cargo run --bin uniffi-bindgen generate \
            --library target/aarch64-apple-darwin/release/liblumen_pdf_core.dylib \
            --language swift \
            --out-dir ../LumenPDF/Generated

      # ── 生成 Xcode 项目 ─────────────────────────────────────────────────────
      - name: Generate Xcode project
        run: cd LumenPDF && xcodegen generate

      # ── 构建 macOS App ──────────────────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive App
        run: |
          xcodebuild archive \
            -project LumenPDF/LumenPDF.xcodeproj \
            -scheme LumenPDF \
            -destination 'platform=macOS' \
            -archivePath build/LumenPDF.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/LumenPDF.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist scripts/ExportOptions.plist

      - name: Zip App bundle
        run: |
          cd build/export
          zip -r ../../LumenPDF-${{ github.ref_name }}.zip LumenPDF.app

      # ── 发布 GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LumenPDF-${{ github.ref_name }}.zip
            liblumen_pdf_core.dylib
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
