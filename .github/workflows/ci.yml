name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust checks ────────────────────────────────────────────────────────────
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: lumen-pdf-core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lumen-pdf-core

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      # Domain 层单元测试（无 I/O 依赖，必须 100% 通过）
      - name: test domain
        run: cargo test domain -- --nocapture

      - name: test all
        run: cargo test

  # ─── Swift / Xcode checks ───────────────────────────────────────────────────
  swift:
    name: Swift (build check)
    runs-on: macos-latest
    needs: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lumen-pdf-core

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build Rust dylib + generate Swift bindings
        run: ./scripts/build-rust.sh

      - name: Generate Xcode project
        run: cd LumenPDF && xcodegen generate

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project LumenPDF/LumenPDF.xcodeproj \
            -scheme LumenPDF \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
