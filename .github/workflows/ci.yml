name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust checks ────────────────────────────────────────────────────────────
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: reflect-pdf-core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: reflect-pdf-core

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # 领域层单元测试（无 I/O 依赖，必须 100% 通过）
      - name: test - domain (no I/O)
        run: cargo test domain --all-features -- --nocapture

      # 全量测试（含 integration tests）
      - name: test - all
        run: cargo test --all-features

  # ─── Swift / Xcode checks ───────────────────────────────────────────────────
  swift:
    name: Swift (build check)
    runs-on: macos-latest
    needs: rust   # Swift 依赖 Rust dylib，先跑 Rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: reflect-pdf-core

      - name: Install uniffi-bindgen-swift
        run: cargo install uniffi-bindgen-swift

      - name: Build Rust dylib + generate Swift bindings
        run: ./scripts/build-rust.sh

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project ReflectPDF/ReflectPDF.xcodeproj \
            -scheme ReflectPDF \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
        # xcpretty 可选，没装时删掉 "| xcpretty" 即可
