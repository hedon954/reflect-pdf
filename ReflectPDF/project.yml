name: ReflectPDF
# 用法：cd ReflectPDF && xcodegen generate
options:
  bundleIdPrefix: com.reflectpdf
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  ReflectPDF:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: Services
      - path: Generated
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reflectpdf.app
        INFOPLIST_FILE: Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        OTHER_LDFLAGS: "$(inherited) -lreflect_pdf_core"
        LIBRARY_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Generated"
        HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/Generated"
    entitlements:
      path: ReflectPDF.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
